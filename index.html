<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טבלת כלים ופתרונות מדף</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161b24;
    --surface2: #1e2535;
    --border: #252d3d;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --accent3: #2dd4a0;
    --accent4: #f59e42;
    --accent5: #e95b7b;
    --text: #e8edf5;
    --text-muted: #8896aa;
    --text-dim: #5a6a80;
    --green: #2dd4a0;
    --yellow: #f59e42;
    --red: #e95b7b;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d1525 0%, #111827 50%, #0d1525 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(79,142,247,0.3);
  }
  .logo-text h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text p { font-size: 0.78rem; color: var(--text-muted); }
  .header-stats {
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .stat-pill strong { color: var(--accent); font-weight: 700; }

  /* Search & Filter */
  .controls {
    max-width: 1400px;
    margin: 24px auto;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 44px 11px 16px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 0.82rem;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,142,247,0.08);
  }
  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    color: #fff;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  /* Main Content */
  .main { max-width: 1400px; margin: 0 auto; padding: 0 24px 48px; }

  /* Section */
  .section {
    margin-bottom: 28px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }
  .section-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.2px;
    flex: 1;
  }
  .section-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 0.72rem;
    color: var(--text-muted);
  }
  .section-toggle {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform 0.25s;
  }
  .section-toggle.closed { transform: rotate(-90deg); }

  /* Cards Grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .cards-grid.collapsed { max-height: 0 !important; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    position: relative;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .card:hover {
    border-color: rgba(79,142,247,0.35);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    transform: translateY(-2px);
  }
  .card.editing {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(79,142,247,0.15);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .card-emoji {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-link {
    font-size: 0.72rem;
    color: var(--accent);
    text-decoration: none;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-link:hover { text-decoration: underline; }
  .card-actions {
    display: flex; gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover .card-actions { opacity: 1; }
  .btn-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.danger:hover { border-color: var(--red); color: var(--red); }

  .card-desc {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.55;
  }
  .card-usage {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
    border-right: 2px solid var(--border);
    padding-right: 8px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .price-badge {
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    border: 1px solid;
    white-space: nowrap;
  }
  .price-free { color: var(--green); border-color: rgba(45,212,160,0.3); background: rgba(45,212,160,0.08); }
  .price-paid { color: var(--yellow); border-color: rgba(245,158,66,0.3); background: rgba(245,158,66,0.08); }
  .price-mixed { color: var(--accent); border-color: rgba(79,142,247,0.3); background: rgba(79,142,247,0.08); }
  .price-trial { color: var(--accent5); border-color: rgba(233,91,123,0.3); background: rgba(233,91,123,0.08); }

  .price-text {
    font-size: 0.68rem;
    color: var(--text-dim);
    flex: 1;
    text-align: left;
  }

  /* Edit Mode */
  .edit-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 0.82rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    resize: none;
  }
  .edit-field:focus { border-color: var(--accent); }
  .edit-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 3px; }
  .edit-group { display: flex; flex-direction: column; gap: 3px; }
  .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .edit-actions {
    display: flex; gap: 8px; margin-top: 4px;
  }
  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    color: #fff;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .btn-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 0.8rem;
  }

  /* Add Card Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(12px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; }
  .modal-fields { display: flex; flex-direction: column; gap: 12px; }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px 24px;
    color: var(--text);
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 300;
    transition: transform 0.3s, opacity 0.3s;
    opacity: 0;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; }

  /* Summary section style */
  .section-summary .card { border-color: rgba(124,92,191,0.3); }
  .section-quiz .card { border-color: rgba(45,212,160,0.2); }

  @media (max-width: 640px) {
    .header { padding: 16px; }
    .controls { padding: 0 12px; }
    .main { padding: 0 12px 40px; }
    .cards-grid { grid-template-columns: 1fr; }
    .edit-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">
        <h1>כלים ופתרונות מדף</h1>
        <p>AI Game Changer · BrainAI</p>
      </div>
    </div>
    <div class="header-stats">

</div>

  <button class="add-btn" onclick="openModal()">+ הוסף כלי</button>
</div>

<div class="main" id="main"></div>

<!-- Add Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">

      <div class="edit-group">

      </div>
      <div class="edit-group">
        <div class="edit-label">איך הוא עוזר בעבודה</div>
        <textarea class="edit-field" id="new-usage" rows="2" placeholder="שימוש מעשי בעבודה עם לקוחות"></textarea>
      </div>
      <div class="edit-row">
        <div class="edit-group">
          <div class="edit-label">מצב תמחור</div>
          <input class="edit-field" id="new-free" placeholder="חינם / בתשלום / ניסיון">
        </div>
        <div class="edit-group">
          <div class="edit-label">מחיר</div>
          <input class="edit-field" id="new-price" placeholder="$0 / $20 לחודש...">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-save" onclick="addTool()">שמור כלי</button>
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  {id:75, cat:"📝 מבדקים ומטלות הקורס", name:"הגשה: שיעור 2 — השארת פרטים", url:"https://form.fillout.com/t/5JEhgzVqGCus", desc:"הגשת אוטומציית השארת פרטים", usage:"הגשת תרגיל Fillout/Make", free:"חינם", price:""},
  {id:76, cat:"📝 מבדקים ומטלות הקורס", name:"הגשה: שיעור 2 — בית קפה", url:"https://form.fillout.com/t/2wTPeZqNYyus", desc:"הגשת אוטומציית הזמנות", usage:"הגשת אוטומציית הזמנות", free:"חינם", price:""},
  {id:77, cat:"📝 מבדקים ומטלות הקורס", name:"הגשה: שיעור 3 — סינון לידים", url:"https://form.fillout.com/t/2z4FNsfJbKus", desc:"הגשת אוטומציית AI ללידים", usage:"הגשת אוטומציית סינון והפניית לידים", free:"חינם", price:""},
  {id:78, cat:"📝 מבדקים ומטלות הקורס", name:"הגשה: שיעור 3 — קליניקת GLOW", url:"https://form.fillout.com/t/35EvFqYUo8us", desc:"הגשת אוטומציית קביעת פגישות", usage:"הגשת אוטומציית קביעת פגישות", free:"חינם", price:""},
  {id:79, cat:"📝 מבדקים ומטלות הקורס", name:"הגשה: שיעור 3 — שדרוג AI", url:"https://form.fillout.com/t/mV4cSut6f4us", desc:"הגשת שדרוג תרחיש קיים", usage:"הגשת שדרוג לאוטומציית AI", free:"חינם", price:""},
  {id:80, cat:"📝 מבדקים ומטלות הקורס", name:"הגשה: שיעור 3 — BurgerHouse", url:"https://form.fillout.com/t/9KjA7m82v5us", desc:"הגשת אוטומציית טיפול במשוב לקוחות", usage:"הגשת אוטומציית BurgerHouse", free:"חינם", price:""},
];

let nextId = 100;
let currentFilter = 'all';
let currentSearch = '';
let collapsedSections = new Set();

// ─── Category colors ─────────────────────────────────────
const catColors = {
  "🔗 אוטומציות וחיבור מערכות": "#4f8ef7",
  "⚡ אוטומציות חלופיות": "#7c5cbf",
  "🤖 AI ומודלים": "#2dd4a0",
  "💻 בניית אפליקציות ואתרים": "#f59e42",
  "💬 צ׳אטבוטים לעסקים": "#e95b7b",
  "📋 טפסים ואיסוף מידע": "#4f8ef7",
  "✍️ חתימה דיגיטלית": "#2dd4a0",
  "🎬 עריכת וידאו ותוכן": "#f59e42",
  "🎙️ סיכום פגישות AI": "#7c5cbf",
  "📅 תיאום ניהול לקוחות": "#2dd4a0",
  "📊 CRM וניהול עבודה": "#4f8ef7",
  "📱 ניהול סושיאל": "#e95b7b",
  "✏️ שרטוט ואפיון תהליכים": "#f59e42",
  "🎨 עיצוב ומצגות": "#e95b7b",
  "🔧 כלי פיתוח ועזר": "#7c5cbf",
  "🔑 קיצורי Google": "#2dd4a0",
  "💳 סליקה וחשבוניות ישראל": "#4f8ef7",
  "🌍 סליקה בינלאומית": "#7c5cbf",
  "🧠 סוכני AI מהקורס": "#f59e42",
  "📚 למידה ומשאבים": "#2dd4a0",
  "⚙️ התקנת Claude": "#2dd4a0",
  "📝 מבדקים ומטלות הקורס": "#e95b7b",
};

function getColor(cat) { return catColors[cat] || "#4f8ef7"; }

function getPriceBadge(tool) {
  const f = (tool.free || '').toLowerCase();
  const p = (tool.price || '').toLowerCase();
  if (f.includes('100% חינמי') || f.includes('חינם') && !p) return ['price-free','✅ חינמי'];
  if (f.includes('חינמי') || f.includes('free')) {
    if (p) return ['price-mixed','חינמי + בתשלום'];
    return ['price-free','✅ חינמי'];
  }
  if (f.includes('ניסיון') || f.includes('trial')) return ['price-trial','🎁 ניסיון'];
  if (f.includes('בתשלום') || p) return ['price-paid','💰 בתשלום'];
  return ['price-mixed','—'];
}

function matchFilter(tool) {
  if (currentFilter === 'free') {
    const f = (tool.free || '').toLowerCase();
    return f.includes('חינמי') || f.includes('free') || f.includes('חינם');
  }
  if (currentFilter === 'paid') {
    const f = (tool.free || '').toLowerCase();
    return f.includes('בתשלום') || f.includes('paid') || (tool.price && tool.price.length > 0);
  }
  return true;
}

function matchSearch(tool) {
  if (!currentSearch) return true;
  const q = currentSearch.toLowerCase();
  return (
    (tool.name||'').toLowerCase().includes(q) ||
    (tool.cat||'').toLowerCase().includes(q) ||
    (tool.desc||'').toLowerCase().includes(q) ||
    (tool.usage||'').toLowerCase().includes(q)
  );
}

// ─── RENDER ──────────────────────────────────────────────
function render() {
  const filtered = tools.filter(t => matchFilter(t) && matchSearch(t));
  
  // Group by category
  const cats = {};
  filtered.forEach(t => {
    if (!cats[t.cat]) cats[t.cat] = [];
    cats[t.cat].push(t);
  });

  document.getElementById('total-tools').textContent = tools.length;
  document.getElementById('total-cats').textContent = Object.keys(catColors).length;

  const main = document.getElementById('main');

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>לא נמצאו כלים תואמים לחיפוש</p></div>`;
    return;
  }

  main.innerHTML = Object.entries(cats).map(([cat, items]) => {
    const color = getColor(cat);
    const collapsed = collapsedSections.has(cat);
    return `
    <div class="section" data-cat="${escHtml(cat)}">
      <div class="section-header" onclick="toggleSection('${escHtml(cat)}')">
        <div class="section-dot" style="background:${color}; box-shadow:0 0 8px ${color}66"></div>
        <div class="section-title">${cat}</div>
        <div class="section-count">${items.length} כלים</div>
        <div class="section-toggle ${collapsed ? 'closed' : ''}">▼</div>
      </div>
      <div class="cards-grid ${collapsed ? 'collapsed' : ''}" id="grid-${btoa(encodeURIComponent(cat)).replace(/[^a-zA-Z0-9]/g,'')}" style="max-height:${collapsed ? '0' : '2000px'}">
        ${items.map(t => renderCard(t)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderCard(t) {
  const [badgeClass, badgeLabel] = getPriceBadge(t);
  const domain = t.url ? (new URL(t.url.startsWith('http') ? t.url : 'https://'+t.url).hostname) : '';
  return `
  <div class="card" id="card-${t.id}">
    <div class="card-top">
      <div class="card-emoji" style="background:${getColor(t.cat)}22">${t.name.charAt(0)}</div>
      <div class="card-title-wrap">
        <div class="card-name">${escHtml(t.name)}</div>
        ${t.url ? `<a class="card-link" href="${escHtml(t.url)}" target="_blank" rel="noopener">${domain}</a>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn-icon" onclick="startEdit(${t.id})" title="ערוך">✏️</button>
        <button class="btn-icon danger" onclick="deleteTool(${t.id})" title="מחק">🗑️</button>
      </div>
    </div>
    ${t.desc ? `<div class="card-desc">${escHtml(t.desc)}</div>` : ''}
    ${t.usage ? `<div class="card-usage">${escHtml(t.usage)}</div>` : ''}
    <div class="card-footer">
      <span class="price-badge ${badgeClass}">${badgeLabel}</span>
      ${t.price ? `<span class="price-text">${escHtml(t.price)}</span>` : ''}
    </div>
  </div>`;
}

function renderEditCard(t) {
  return `
  <div class="card editing" id="card-${t.id}">
    <div class="edit-group">
      <div class="edit-label">שם הכלי</div>
      <input class="edit-field" id="e-name-${t.id}" value="${escHtml(t.name)}">
    </div>
    <div class="edit-group">
      <div class="edit-label">קישור</div>
      <input class="edit-field" id="e-url-${t.id}" value="${escHtml(t.url||'')}">
    </div>
    <div class="edit-group">
      <div class="edit-label">למה הוא משמש</div>
      <textarea class="edit-field" id="e-desc-${t.id}" rows="2">${escHtml(t.desc||'')}</textarea>
    </div>
    <div class="edit-group">
      <div class="edit-label">איך עוזר בעבודה</div>
      <textarea class="edit-field" id="e-usage-${t.id}" rows="2">${escHtml(t.usage||'')}</textarea>
    </div>
    <div class="edit-row">
      <div class="edit-group">
        <div class="edit-label">מצב תמחור</div>
        <input class="edit-field" id="e-free-${t.id}" value="${escHtml(t.free||'')}">
      </div>
      <div class="edit-group">
        <div class="edit-label">מחיר</div>
        <input class="edit-field" id="e-price-${t.id}" value="${escHtml(t.price||'')}">
      </div>
    </div>
    <div class="edit-actions">
      <button class="btn-save" onclick="saveEdit(${t.id})">💾 שמור</button>
      <button class="btn-cancel" onclick="render()">ביטול</button>
    </div>
  </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────
function startEdit(id) {
  const t = tools.find(x => x.id === id);
  if (!t) return;
  const card = document.getElementById('card-'+id);
  card.outerHTML = renderEditCard(t);
}

function saveEdit(id) {
  const t = tools.find(x => x.id === id);
  if (!t) return;
  t.name = document.getElementById('e-name-'+id).value;
  t.url = document.getElementById('e-url-'+id).value;
  t.desc = document.getElementById('e-desc-'+id).value;
  t.usage = document.getElementById('e-usage-'+id).value;
  t.free = document.getElementById('e-free-'+id).value;
  t.price = document.getElementById('e-price-'+id).value;
  showToast('✅ השינויים נשמרו');
  render();
}

function deleteTool(id) {
  if (!confirm('למחוק כלי זה?')) return;
  tools = tools.filter(t => t.id !== id);
  showToast('🗑️ הכלי נמחק');
  render();
}

function toggleSection(cat) {
  if (collapsedSections.has(cat)) collapsedSections.delete(cat);
  else collapsedSections.add(cat);
  render();
}

// ─── ADD MODAL ───────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('new-name').focus();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function addTool() {
  const cat = document.getElementById('new-cat').value.trim();
  const name = document.getElementById('new-name').value.trim();
  if (!cat || !name) { alert('קטגוריה ושם הכלי הם שדות חובה'); return; }
  const newTool = {
    id: nextId++,
    cat, name,
    url: document.getElementById('new-url').value.trim(),
    desc: document.getElementById('new-desc').value.trim(),
    usage: document.getElementById('new-usage').value.trim(),
    free: document.getElementById('new-free').value.trim(),
    price: document.getElementById('new-price').value.trim(),
  };
  tools.push(newTool);
  ['new-cat','new-name','new-url','new-desc','new-usage','new-free','new-price'].forEach(id => document.getElementById(id).value = '');
  closeModal();
  showToast('✅ הכלי נוסף בהצלחה!');
  render();
}

// ─── SEARCH & FILTER ─────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── UTILS ───────────────────────────────────────────────
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
render();
</script>
</body>
</html>
